{{- $hero := .Params.hero -}}
{{- $alt  := .Params.hero_alt | default .Title -}}
{{- $cap  := .Params.hero_caption -}}
<figure class="hero">
  <img
    src="{{ $hero | absURL }}"
    alt="{{ $alt }}"
    loading="eager"
    decoding="async"
    fetchpriority="high">
  {{- with $cap }}
  <figcaption class="hero__caption">{{ . | safeHTML }}</figcaption>
  {{- end }}
</figure>
