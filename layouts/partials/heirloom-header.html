<header class="site-header">
  <div class="site-header__inner">
    <a class="site-brand" href="{{ "/" | relURL }}" rel="home">
      {{ site.Title }}
    </a>

    {{- with site.Menus.main }}
    <nav class="site-nav" aria-label="Main">
      {{- range . }}
      <a class="site-nav__link" href="{{ .URL | relURL }}">{{ .Name | safeHTML }}</a>
      {{- end }}
    </nav>
    {{- end }}

    <button
      type="button"
      class="theme-toggle"
      data-theme-toggle
      aria-label="Switch to dark mode"
      aria-pressed="false">
      {{/* Moon = currently light, click to go dark */}}
      <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
      </svg>
      {{/* Sun = currently dark, click to go light */}}
      <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
      </svg>
    </button>
  </div>
</header>
