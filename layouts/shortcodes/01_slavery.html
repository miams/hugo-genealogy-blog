{{ if .IsNamedParams }}
  <table id="slave-table">
    <thead>
      <tr>
        <th>Age</th>
        <th>Sex</th>
        <th>Color</th>
        <th>Fugitive</th>
      </tr>
    </thead>
    <tbody>
      {{ $data := index $.Site.Data.slavery $.Params.data }}
      {{ range $data }}
        <tr>
          {{ partial "01_slavery" . }}
        </tr>
      {{ end }}
    </tbody>
  </table>
{{- end -}}
<script>
  (function () {
    function init() {
      if (window.jQuery && window.jQuery.fn && window.jQuery.fn.DataTable) {
        window.jQuery("#slave-table").DataTable({
          paging: false,
          searching: false,
          info: false,
          lengthChange: false,
          ordering: true,
          autoWidth: false,
          responsive: true,
          layout: { topStart: null, topEnd: null, bottomStart: null, bottomEnd: null },
          columnDefs: [
            { targets: 0, className: "dt-right" },
            { targets: 3, createdCell: function (td, cellData) {
              if (String(cellData).trim() === "Escaped") td.classList.add("is-escaped");
            }}
          ]
        });
      } else {
        setTimeout(init, 50);
      }
    }
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }
  })();
</script>
